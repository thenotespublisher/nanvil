<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanvil Explorer</title>
  <script>(function(){try{var k='nanvil-theme',t=localStorage.getItem(k);if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-mesh" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo-wrap">
        <img src="nanvil-logo.png" alt="" class="logo-img" width="42" height="42">
      </div>
      <div>
        <h1>Nanvil Explorer</h1>
        <p class="subtitle">Neo3 local development chain</p>
      </div>
    </div>
    <form class="search-bar" id="search-form" role="search">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input
        type="search"
        id="search-input"
        placeholder="Block #, tx hash, contract hash or name…"
        autocomplete="off"
        spellcheck="false"
      />
      <button type="submit" class="search-btn">Search</button>
    </form>
    <a href="/docs/" class="docs-link" title="Nanvil documentation">Docs</a>
    <div class="theme-switcher" role="group" aria-label="Theme">
      <button type="button" class="theme-option" data-theme="light" aria-pressed="false" title="Light theme">
        <span class="theme-option-icon" aria-hidden="true">☀</span>
        <span class="theme-option-label">Light</span>
      </button>
      <button type="button" class="theme-option" data-theme="dark" aria-pressed="false" title="Dark theme">
        <span class="theme-option-icon" aria-hidden="true">☾</span>
        <span class="theme-option-label">Dark</span>
      </button>
    </div>
    <div class="stats" id="header-stats">
      <div class="stat-card">
        <span class="stat-label">Height</span>
        <span class="stat-value" id="stat-height">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Mempool</span>
        <span class="stat-value" id="stat-mempool">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Network</span>
        <span class="stat-value stat-network" id="stat-network">—</span>
      </div>
      <button type="button" class="stat-card live-stat" id="live-toggle" aria-expanded="false" aria-controls="activity-drawer" title="Toggle live event log">
        <span class="stat-label">Live</span>
        <span class="stat-value live-indicator" id="stat-live">●</span>
      </button>
    </div>
  </header>

  <div id="activity-toast" class="activity-toast" hidden></div>

  <nav class="tabs">
    <button class="tab active" data-view="blocks">
      <span class="tab-icon">▣</span> Blocks
    </button>
    <button class="tab" data-view="transactions">
      <span class="tab-icon">⇄</span> Transactions
    </button>
    <button class="tab" data-view="contracts">
      <span class="tab-icon">◈</span> Contracts
    </button>
    <button class="tab" data-view="mempool">
      <span class="tab-icon">◎</span> Mempool
    </button>
  </nav>

  <main id="app">
    <div class="loading" id="loading">Loading…</div>
  </main>

  <div id="activity-backdrop" class="activity-backdrop" hidden></div>
  <aside id="activity-drawer" class="activity-drawer" aria-label="Live activity" aria-hidden="true">
    <div class="activity-drawer-header">
      <h2>Live events</h2>
      <button type="button" class="activity-drawer-close" id="activity-close" aria-label="Close live events">×</button>
    </div>
    <p class="activity-drawer-hint">WebSocket feed — blocks, txs, mempool, executions</p>
    <ul id="activity-feed" class="activity-feed">
      <li class="empty">Waiting for chain events…</li>
    </ul>
  </aside>

  <footer class="footer">
    <span>Powered by <strong>nanvil</strong></span>
    <span class="footer-sep">·</span>
    <a href="/docs/">Documentation</a>
    <span class="footer-sep">·</span>
    <span class="mono" id="footer-rpc">RPC proxy</span>
  </footer>

  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>

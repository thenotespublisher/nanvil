name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: make build
      - name: Unit tests
        run: go test ./pkg/nanvil/... ./pkg/ncast/... ./pkg/nsmith/... -race -count=1 -timeout 120s
      - name: Integration tests
        run: go test ./integration/... -count=1 -timeout 120s
      - name: Vet
        run: make vet

  nsmith-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: nsmith integration tests
        run: NSMITH_INTEGRATION=1 go test -tags=nsmith_integration ./pkg/nsmith/... -count=1 -timeout 15m
